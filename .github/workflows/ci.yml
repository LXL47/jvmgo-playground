name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: apps/go.sum

      - name: 运行测试
        run: go test ./apps/... ./jvm/runtime/...

      - name: 运行静态检查
        run: go vet ./apps/... ./jvm/runtime/...

      - name: 构建 API 镜像
        run: docker build --target api --tag jvmgo-playground-api:ci .

      - name: 构建 Runner 镜像
        run: docker build --target runner --tag jvmgo-playground-runner:ci .
